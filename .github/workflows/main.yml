name: CI
permissions:
  contents: read

on: pull_request

jobs:

  test-latest:

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    name: Test with Angular@latest on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - name: Install dependencies
      run: npm ci
      env:
        CI: true
    - name: Build the lib
      run: npm run build
    - name: Run unit tests
      run: npm run unit:ci
    - name: Run e2e tests
      run: npm run e2e
      if: matrix.os == 'ubuntu-latest'

  test-minimum:

    name: Test with Angular@22.0.0 and minimum dependencies requirements
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22.22'
    - name: Install dependencies
      run: npm ci
      env:
        CI: true
    - name: Build the lib (with the current version, as it is what is published on npm)
      run: npm run build
    - name: Downgrade dependencies to minimal required version
      run: npm install typescript@6.0.3 tslib@2.5.0 better-typescript-lib@2.12.0 rxjs@7.6.0 @angular/common@22.0.0 @angular/compiler@22.0.0 @angular/core@22.0.0 @angular/platform-browser@22.0.0 @angular/router@22.0.0 @angular/cli@22.0.0 @angular/compiler-cli@22.0.0 @angular/build@22.0.0 --legacy-peer-deps
      env:
        CI: true
    - name: Run unit tests
      run: npm run unit:ci
    - name: Run e2e tests
      run: npm run e2e
